  function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
  function dateBR(v){if(!v)return '—';const [y,m,d]=v.split('-');return `${d}/${m}/${y}`}
  function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}
  const statusNames={approved:'Aprovado',sent:'Enviado',draft:'Rascunho',rejected:'Recusado',expired:'Expirado'};
  function badge(status){return `<span class="badge ${status}">${statusNames[status]||status}</span>`}
  function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove('show'),2500)}
  function openModal(title,body){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modal').classList.remove('hidden')}
  function closeModal(){document.getElementById('modal').classList.add('hidden')}
  document.getElementById('modalClose').onclick=closeModal;document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});

  function filteredBudgets(){
    let list=[...data.budgets];const period=document.getElementById('periodFilter')?.value||'all';const resp=document.getElementById('respFilter')?.value||'all';const service=document.getElementById('serviceFilter')?.value||'all';
    if(period==='30') list=list.filter(b=>b.date>='2026-06-19');if(period==='month') list=list.filter(b=>b.date>='2026-07-01');if(period==='year') list=list.filter(b=>b.date>='2026-01-01');
    if(resp!=='all')list=list.filter(b=>b.responsible===resp);if(service!=='all')list=list.filter(b=>b.service===service);if(dashboardFilter!=='all')list=list.filter(b=>b.status===dashboardFilter);
    return list;
  }
  function dashboard(){
    const all=filteredBudgets();const emitted=all.filter(b=>b.status!=='draft');const answered=emitted.filter(b=>['approved','rejected'].includes(b.status));const approved=emitted.filter(b=>b.status==='approved');const sent=emitted.filter(b=>b.status==='sent');const conversion=answered.length?Math.round(approved.length/answered.length*100):0;const approvedValue=approved.reduce((s,b)=>s+b.value,0);
    const statusOrder=['approved','sent','draft','rejected','expired'];const counts=Object.fromEntries(statusOrder.map(s=>[s,all.filter(b=>b.status===s).length]));const max=Math.max(1,...Object.values(counts));
    const expiring=all.filter(b=>['sent','draft'].includes(b.status)&&b.validUntil>=today).sort((a,b)=>a.validUntil.localeCompare(b.validUntil)).slice(0,4);
    const rows=[...all].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
    const uniqueResp=[...new Set(data.budgets.map(b=>b.responsible))];const uniqueServices=[...new Set(data.budgets.map(b=>b.service))];
    return `<div class="page-head"><div><h1>Painel</h1><p>Controle visual dos orçamentos — ${esc(data.company)}</p></div><div class="head-actions"><button class="btn" data-action="reset-filter">Limpar filtro</button><button class="btn primary" data-action="new-budget">+ Novo orçamento</button></div></div>
      <div class="filters"><div class="field"><label>Período</label><select class="select" id="periodFilter"><option value="30">Últimos 30 dias</option><option value="month">Mês atual</option><option value="year">Ano atual</option><option value="all">Todo o período</option></select></div><div class="field"><label>Responsável</label><select class="select" id="respFilter"><option value="all">Todos</option>${uniqueResp.map(v=>`<option>${esc(v)}</option>`).join('')}</select></div><div class="field" style="min-width:240px"><label>Tipo de serviço</label><select class="select" id="serviceFilter"><option value="all">Todos os serviços</option>${uniqueServices.map(v=>`<option>${esc(v)}</option>`).join('')}</select></div><div class="field" style="min-width:120px"><label>Atualização</label><button class="btn" data-action="refresh-dashboard">Atualizar dados</button></div></div>
      <div class="stats">
        <button class="stat-card" data-status="all"><div class="stat-label">Orçamentos emitidos</div><div class="stat-value">${emitted.length}</div><div class="stat-note">excluindo rascunhos</div></button>
        <button class="stat-card" data-status="approved"><div class="stat-label">Taxa de conversão</div><div class="stat-value green">${conversion}%</div><div class="stat-note">${approved.length} aprovados de ${answered.length} já respondidos</div></button>
        <button class="stat-card" data-status="approved"><div class="stat-label">Valor aprovado</div><div class="stat-value">${money(approvedValue)}</div><div class="stat-note">soma dos orçamentos aprovados</div></button>
        <button class="stat-card" data-status="sent"><div class="stat-label">Aguardando resposta</div><div class="stat-value">${sent.length}</div><div class="stat-note">enviado, sem retorno do cliente</div></button>
      </div>
      <div class="grid-2"><section class="card"><div class="card-pad"><h2 class="card-title">Orçamentos por status</h2><p class="card-sub">Distribuição dos ${all.length} orçamentos no período. Clique em um status para filtrar.</p><div class="status-list">${statusOrder.map(s=>`<div class="status-row"><button class="status-pill ${s}" data-status="${s}">${statusNames[s]}</button><div class="bar ${s}"><span style="width:${counts[s]/max*100}%"></span></div><strong>${counts[s]}</strong></div>`).join('')}</div></div></section>
      <section class="card"><div class="card-pad"><h2 class="card-title">Propostas a acompanhar</h2><p class="card-sub">Enviadas ou em rascunho próximas da validade.</p><div class="alert-list">${expiring.length?expiring.map(b=>`<div class="alert-item"><div><strong>${esc(b.number)}</strong><small>${esc(b.client)}</small></div><div class="alert-date">${dateBR(b.validUntil)}</div></div>`).join(''):'<div class="empty">Nenhuma proposta próxima do vencimento.</div>'}</div></div></section></div>
      <section class="card"><div class="card-head"><div><h2 class="card-title">Orçamentos recentes</h2><p class="card-sub">Clique em uma linha para abrir a lista completa.</p></div><button class="btn sm" data-page="budgets">Ver todos</button></div><div class="table-wrap"><table class="table"><thead><tr><th>Emissão</th><th>Orçamento</th><th>Cliente</th><th>Serviço</th><th class="amount">Valor</th><th>Status</th></tr></thead><tbody>${rows.map(b=>`<tr data-open-budgets><td>${dateBR(b.date)}</td><td><strong>${esc(b.number)}</strong></td><td>${esc(b.client)}</td><td>${esc(b.service)}</td><td class="amount"><strong>${money(b.value)}</strong></td><td>${badge(b.status)}</td></tr>`).join('')}</tbody></table></div></section>`;
  }
  function budgetsPage(){const list=[...data.budgets].sort((a,b)=>b.date.localeCompare(a.date));return `<div class="page-head"><div><h1>Orçamentos</h1><p>Crie, acompanhe e filtre as propostas comerciais.</p></div><div class="head-actions"><button class="btn primary" data-action="new-budget">+ Novo orçamento</button></div></div><div class="filters"><div class="field search"><label>Pesquisar</label><input class="input" id="budgetSearch" placeholder="Número, cliente ou serviço"></div><div class="field"><label>Status</label><select class="select" id="budgetStatus"><option value="all">Todos</option>${Object.entries(statusNames).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></div></div><section class="card"><div class="table-wrap"><table class="table"><thead><tr><th>Número</th><th>Cliente</th><th>Serviço</th><th>Validade</th><th class="amount">Valor</th><th>Status</th><th>Ações</th></tr></thead><tbody id="budgetRows">${budgetRows(list)}</tbody></table></div></section>`}
  function budgetRows(list){return list.map(b=>`<tr><td><strong>${esc(b.number)}</strong><br><small>${dateBR(b.date)}</small></td><td>${esc(b.client)}</td><td>${esc(b.service)}</td><td>${dateBR(b.validUntil)}</td><td class="amount"><strong>${money(b.value)}</strong></td><td>${badge(b.status)}</td><td><div class="toolbar"><button class="btn sm" data-action="status-budget" data-id="${b.id}">Status</button><button class="btn sm" data-action="duplicate-budget" data-id="${b.id}">Duplicar</button></div></td></tr>`).join('')||'<tr><td colspan="7" class="empty">Nenhum orçamento encontrado.</td></tr>'}
  function clientsPage(){return `<div class="page-head"><div><h1>Clientes</h1><p>Cadastro demonstrativo de pessoas e empresas.</p></div><button class="btn primary" data-action="new-client">+ Novo cliente</button></div><section class="card"><div class="table-wrap"><table class="table"><thead><tr><th>Cliente</th><th>Telefone</th><th>E-mail</th><th>Orçamentos</th></tr></thead><tbody>${data.clients.map(c=>`<tr><td><strong>${esc(c.name)}</strong></td><td>${esc(c.phone)}</td><td>${esc(c.email)}</td><td>${data.budgets.filter(b=>b.client===c.name).length}</td></tr>`).join('')}</tbody></table></div></section>`}
  function servicesPage(){return `<div class="page-head"><div><h1>Catálogo de serviços</h1><p>Serviços, unidades e valores-base usados nos orçamentos.</p></div><button class="btn primary" data-action="new-service">+ Novo serviço</button></div><section class="card"><div class="table-wrap"><table class="table"><thead><tr><th>Categoria</th><th>Serviço</th><th>Unidade</th><th class="amount">Valor-base</th></tr></thead><tbody>${data.services.map(s=>`<tr><td>${esc(s.category)}</td><td><strong>${esc(s.name)}</strong></td><td>${esc(s.unit)}</td><td class="amount">${money(s.price)}</td></tr>`).join('')}</tbody></table></div></section>`}
  function templatesPage(){return `<div class="page-head"><div><h1>Modelos de proposta</h1><p>Textos padronizados para agilizar a criação dos orçamentos.</p></div><button class="btn primary" data-action="new-template">+ Novo modelo</button></div><div class="stats">${data.templates.map(t=>`<div class="stat-card"><div class="stat-label">${esc(t.category)}</div><div class="stat-value" style="font-size:18px">${esc(t.name)}</div><div class="stat-note">Modelo ativo · pronto para uso</div></div>`).join('')}</div>`}
  function financePage(){const open=data.receivables.reduce((s,r)=>s+Math.max(0,r.value-r.paid),0),received=data.receivables.reduce((s,r)=>s+r.paid,0),expense=data.expenses.reduce((s,e)=>s+e.value,0);return `<div class="page-head"><div><h1>Financeiro</h1><p>Contas a receber, recebimentos e despesas demonstrativas.</p></div><button class="btn primary" data-action="new-receivable">+ Conta a receber</button></div><div class="kpi-mini"><div class="mini-card"><span>Saldo a receber</span><strong>${money(open)}</strong></div><div class="mini-card"><span>Recebido</span><strong style="color:var(--green)">${money(received)}</strong></div><div class="mini-card"><span>Despesas</span><strong style="color:var(--red)">${money(expense)}</strong></div></div><section class="card" style="margin-top:20px"><div class="card-head"><div><h2 class="card-title">Contas a receber</h2><p class="card-sub">Lançamentos vinculados aos orçamentos.</p></div></div><div class="table-wrap"><table class="table"><thead><tr><th>Vencimento</th><th>Conta</th><th>Cliente</th><th class="amount">Valor</th><th>Saldo</th><th>Situação</th><th>Ações</th></tr></thead><tbody>${data.receivables.map(r=>{const bal=Math.max(0,r.value-r.paid),st=bal===0?'paid':r.due<today?'late':'open';return `<tr><td>${dateBR(r.due)}</td><td><strong>${esc(r.budget)}</strong></td><td>${esc(r.client)}</td><td class="amount">${money(r.value)}</td><td class="amount"><strong>${money(bal)}</strong></td><td>${st==='paid'?'<span class="badge paid">Pago</span>':st==='late'?'<span class="badge late">Atrasado</span>':'<span class="badge open">Em aberto</span>'}</td><td><div class="toolbar">${bal>0?`<button class="btn sm" data-action="receive" data-id="${r.id}">Receber</button>`:''}<button class="btn sm danger" data-action="delete-receivable" data-id="${r.id}">Excluir</button></div></td></tr>`}).join('')}</tbody></table></div></section>`}
  function settingsPage(){return `<div class="page-head"><div><h1>Configurações</h1><p>Dados da empresa e controles da demonstração.</p></div></div><div class="grid-2"><section class="card"><div class="card-pad"><h2 class="card-title">Empresa ativa</h2><div class="form-grid" style="margin-top:16px"><div class="field span-2"><label>Nome da empresa</label><input class="input" id="companyName" value="${esc(data.company)}"></div><div class="field"><label>Responsável padrão</label><input class="input" id="responsibleName" value="${esc(data.responsible)}"></div><div class="field"><label>Plano</label><input class="input" value="Profissional" disabled></div></div><div class="modal-actions"><button class="btn primary" data-action="save-settings">Salvar alterações</button></div></div></section><section class="card"><div class="card-pad"><h2 class="card-title">Demonstração</h2><p class="card-sub">Os dados ficam somente neste navegador.</p><button class="btn danger" style="margin-top:18px" data-action="restore-demo">Restaurar dados fictícios</button></div></section></div>`}

  function render(page=currentPage){currentPage=page;document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.page===page));const c=document.getElementById('content');c.innerHTML=page==='dashboard'?dashboard():page==='budgets'?budgetsPage():page==='clients'?clientsPage():page==='services'?servicesPage():page==='templates'?templatesPage():page==='finance'?financePage():settingsPage();bindPage();window.scrollTo({top:0,behavior:'smooth'})}
  function bindPage(){
    document.querySelectorAll('[data-page]').forEach(el=>{if(el.classList.contains('nav-item'))return;el.onclick=()=>render(el.dataset.page)});
    document.querySelectorAll('[data-status]').forEach(el=>{el.onclick=()=>{dashboardFilter=el.dataset.status;render('dashboard')}});
    ['periodFilter','respFilter','serviceFilter'].forEach(id=>{const e=document.getElementById(id);if(e)e.onchange=()=>render('dashboard')});
    const search=document.getElementById('budgetSearch'),status=document.getElementById('budgetStatus');if(search||status){const filter=()=>{const q=(search?.value||'').toLowerCase(),st=status?.value||'all';const list=data.budgets.filter(b=>(st==='all'||b.status===st)&&[b.number,b.client,b.service].join(' ').toLowerCase().includes(q));document.getElementById('budgetRows').innerHTML=budgetRows(list);bindPage()};if(search)search.oninput=filter;if(status)status.onchange=filter}
    document.querySelectorAll('[data-action]').forEach(el=>el.onclick=()=>action(el.dataset.action,el.dataset.id));
    document.querySelectorAll('[data-open-budgets]').forEach(el=>el.onclick=()=>render('budgets'));
  }
  function action(type,id){
    if(type==='reset-filter'){dashboardFilter='all';render('dashboard')}
    if(type==='refresh-dashboard'){toast('Painel atualizado.');render('dashboard')}
    if(type==='new-budget') openBudgetForm();
    if(type==='new-client') openClientForm();
    if(type==='new-service') openServiceForm();
    if(type==='new-template') openTemplateForm();
    if(type==='status-budget') openStatusForm(id);
    if(type==='duplicate-budget'){const b=data.budgets.find(x=>x.id===id);if(!b)return;const copy={...b,id:'b'+Date.now(),number:'ORC-2026-'+String(16+data.budgets.length).padStart(3,'0'),date:today,validUntil:'2026-08-02',status:'draft'};data.budgets.push(copy);save();toast('Orçamento duplicado com dados atuais da empresa.');render('budgets')}
    if(type==='receive') openReceiveForm(id);
    if(type==='delete-receivable'){data.receivables=data.receivables.filter(r=>r.id!==id);save();toast('Conta a receber excluída.');render('finance')}
    if(type==='new-receivable') openReceivableForm();
    if(type==='save-settings'){data.company=document.getElementById('companyName').value.trim()||data.company;data.responsible=document.getElementById('responsibleName').value.trim()||data.responsible;save();toast('Configurações salvas.');render('settings')}
    if(type==='restore-demo'){data=clone(seed);save();toast('Demonstração restaurada.');render('dashboard')}
  }
  function openBudgetForm(){openModal('Novo orçamento',`<form id="budgetForm"><div class="form-grid"><div class="field"><label>Cliente</label><select class="select" name="client" required>${data.clients.map(c=>`<option>${esc(c.name)}</option>`).join('')}</select></div><div class="field"><label>Serviço</label><select class="select" name="service" required>${data.services.map(s=>`<option>${esc(s.name)}</option>`).join('')}</select></div><div class="field"><label>Valor</label><input class="input" name="value" type="number" min="0" step="0.01" required></div><div class="field"><label>Validade</label><input class="input" name="validUntil" type="date" value="2026-08-02" required></div><div class="field"><label>Status</label><select class="select" name="status"><option value="draft">Rascunho</option><option value="sent">Enviado</option><option value="approved">Aprovado</option></select></div><div class="field"><label>Responsável</label><input class="input" name="responsible" value="${esc(data.responsible)}"></div></div><div class="modal-actions"><button class="btn" type="button" id="cancelModal">Cancelar</button><button class="btn primary" type="submit">Criar orçamento</button></div></form>`);document.getElementById('cancelModal').onclick=closeModal;document.getElementById('budgetForm').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target),n=Math.max(...data.budgets.map(b=>Number(b.number.split('-').pop())||0))+1;data.budgets.push({id:'b'+Date.now(),number:`ORC-2026-${String(n).padStart(3,'0')}`,date:today,validUntil:f.get('validUntil'),client:f.get('client'),service:f.get('service'),responsible:f.get('responsible'),status:f.get('status'),value:Number(f.get('value'))});save();closeModal();toast('Orçamento criado na demonstração.');render('budgets')}}
  function openClientForm(){openModal('Novo cliente',`<form id="clientForm"><div class="form-grid"><div class="field span-2"><label>Nome</label><input class="input" name="name" required></div><div class="field"><label>Telefone</label><input class="input" name="phone"></div><div class="field"><label>E-mail</label><input class="input" name="email" type="email"></div></div><div class="modal-actions"><button class="btn primary" type="submit">Adicionar cliente</button></div></form>`);document.getElementById('clientForm').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target);data.clients.push({id:'c'+Date.now(),name:f.get('name'),phone:f.get('phone'),email:f.get('email')});save();closeModal();toast('Cliente adicionado.');render('clients')}}
  function openServiceForm(){openModal('Novo serviço',`<form id="serviceForm"><div class="form-grid"><div class="field"><label>Categoria</label><input class="input" name="category" required></div><div class="field"><label>Serviço</label><input class="input" name="name" required></div><div class="field"><label>Unidade</label><input class="input" name="unit" value="serviço"></div><div class="field"><label>Valor-base</label><input class="input" name="price" type="number" min="0" required></div></div><div class="modal-actions"><button class="btn primary" type="submit">Adicionar serviço</button></div></form>`);document.getElementById('serviceForm').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target);data.services.push({id:'s'+Date.now(),category:f.get('category'),name:f.get('name'),unit:f.get('unit'),price:Number(f.get('price'))});save();closeModal();toast('Serviço adicionado.');render('services')}}
  function openTemplateForm(){openModal('Novo modelo',`<form id="templateForm"><div class="form-grid"><div class="field"><label>Categoria</label><input class="input" name="category" required></div><div class="field"><label>Nome do modelo</label><input class="input" name="name" required></div><div class="field span-2"><label>Descrição</label><textarea class="textarea" name="description"></textarea></div></div><div class="modal-actions"><button class="btn primary" type="submit">Criar modelo</button></div></form>`);document.getElementById('templateForm').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target);data.templates.push({id:'t'+Date.now(),category:f.get('category'),name:f.get('name'),active:true});save();closeModal();toast('Modelo criado.');render('templates')}}
  function openStatusForm(id){const b=data.budgets.find(x=>x.id===id);if(!b)return;openModal('Alterar status',`<form id="statusForm"><div class="field"><label>${esc(b.number)} · ${esc(b.client)}</label><select class="select" name="status">${Object.entries(statusNames).map(([k,v])=>`<option value="${k}" ${b.status===k?'selected':''}>${v}</option>`).join('')}</select></div><div class="modal-actions"><button class="btn primary" type="submit">Salvar status</button></div></form>`);document.getElementById('statusForm').onsubmit=e=>{e.preventDefault();b.status=new FormData(e.target).get('status');save();closeModal();toast('Status atualizado.');render('budgets')}}
  function openReceiveForm(id){const r=data.receivables.find(x=>x.id===id);if(!r)return;const balance=Math.max(0,r.value-r.paid);openModal('Registrar recebimento',`<form id="receiveForm"><div class="form-grid"><div class="field span-2"><label>Conta</label><input class="input" value="${esc(r.budget)}" disabled></div><div class="field"><label>Saldo</label><input class="input" value="${money(balance)}" disabled></div><div class="field"><label>Valor recebido</label><input class="input" name="amount" type="number" min="0.01" max="${balance}" step="0.01" value="${balance}" required></div></div><div class="modal-actions"><button class="btn primary" type="submit">Registrar recebimento</button></div></form>`);document.getElementById('receiveForm').onsubmit=e=>{e.preventDefault();const amount=Number(new FormData(e.target).get('amount'));r.paid=Math.min(r.value,r.paid+amount);save();closeModal();toast('Recebimento registrado.');render('finance')}}
  function openReceivableForm(){openModal('Nova conta a receber',`<form id="receivableForm"><div class="form-grid"><div class="field span-2"><label>Descrição</label><input class="input" name="budget" required></div><div class="field"><label>Cliente</label><select class="select" name="client">${data.clients.map(c=>`<option>${esc(c.name)}</option>`).join('')}</select></div><div class="field"><label>Vencimento</label><input class="input" type="date" name="due" value="2026-08-02" required></div><div class="field"><label>Valor</label><input class="input" type="number" name="value" min="0.01" step="0.01" required></div></div><div class="modal-actions"><button class="btn primary" type="submit">Criar conta</button></div></form>`);document.getElementById('receivableForm').onsubmit=e=>{e.preventDefault();const f=new FormData(e.target);data.receivables.push({id:'r'+Date.now(),budget:f.get('budget'),client:f.get('client'),due:f.get('due'),value:Number(f.get('value')),paid:0});save();closeModal();toast('Conta a receber criada.');render('finance')}}

  document.querySelectorAll('.nav-item').forEach(b=>b.onclick=()=>{render(b.dataset.page);closeMobile()});
  const sidebar=document.getElementById('sidebar');document.getElementById('collapseBtn').onclick=()=>{sidebar.classList.toggle('collapsed');try{localStorage.setItem('total-obras-demo-sidebar',sidebar.classList.contains('collapsed')?'1':'0')}catch(e){}};
  try{if(localStorage.getItem('total-obras-demo-sidebar')==='1')sidebar.classList.add('collapsed')}catch(e){}
  const overlay=document.getElementById('mobileOverlay');document.getElementById('menuToggle').onclick=()=>{sidebar.classList.add('mobile-open');overlay.classList.remove('hidden')};overlay.onclick=closeMobile;function closeMobile(){sidebar.classList.remove('mobile-open');overlay.classList.add('hidden')}
  document.getElementById('companySelect').onchange=e=>{data.company=e.target.value;save();render(currentPage)};
  render('dashboard');
})();
</script>
</body></html>
