<body>
<div class="demo-strip">DEMONSTRAÇÃO — ESPELHA A NAVEGAÇÃO E OS DADOS DO TOTAL OBRAS REAL, COM DADOS FICTÍCIOS</div>
<header class="topbar">
  <div class="brand"><span class="brand-mark"></span><div><strong>Total Obras</strong><small>Propostas e Gestão</small></div></div>
  <div class="top-actions">
    <a href="#" data-page="licenca" class="license-pill"><i></i>Plano Profissional · Ativa</a>
    <select id="companySelect" class="company-select"><option>Estúdio Meridiano Arquitetura</option><option>Vértice Engenharia Estrutural</option></select>
    <button id="mobileMenu" class="menu-toggle">☰</button>
  </div>
</header>

  <div class="group">Gestão</div>
  <button class="nav-item active" data-page="dashboard"><span class="ico">▦</span><span class="nav-label">Painel</span></button>
  <button class="nav-item" data-page="budgets"><span class="ico">▤</span><span class="nav-label">Orçamentos</span></button>
  <button class="nav-item" data-page="new-budget"><span class="ico">+</span><span class="nav-label">Novo orçamento</span></button>
  <button class="nav-item" data-page="templates"><span class="ico">◫</span><span class="nav-label">Modelos de proposta</span></button>

<main class="main"><div id="content" class="content"></div></main>

<div id="toast" class="toast"></div>
<script>
(()=>{
const STORAGE='total-obras-demo-real-v1';
const TODAY=()=>new Date();
const iso=(d)=>{const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`};
const addDays=(d,n)=>{const c=new Date(d);c.setDate(c.getDate()+n);return c};
const fmtDate=(v)=>{if(!v)return '—';const m=typeof v==='string'&&/^(\d{4})-(\d{2})-(\d{2})/.exec(v);const d=m?new Date(Number(m[1]),Number(m[2])-1,Number(m[3])):new Date(v);return isNaN(d)?'—':d.toLocaleDateString('pt-BR')};
const fmtMoney=(v)=>(Number(v||0)/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const esc=(v)=>String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));

/* ---- status model (espelha src/lib/budgetStatus.ts) ---- */
const STATUS_ORDER=['draft','sent','approved','rejected','expired','cancelled'];
const STATUS_LABELS={draft:'Rascunho',sent:'Enviado',approved:'Aprovado',rejected:'Recusado',expired:'Expirado',cancelled:'Cancelado'};
const STATUS_PILL={draft:'pill-draft',sent:'pill-sent',approved:'pill-approved',rejected:'pill-rejected',expired:'pill-expired',cancelled:'pill-cancelled'};
const STATUS_BAR={draft:'#4d5967',sent:'#294e70',approved:'#0d7a4f',rejected:'#a3253c',expired:'#9a7626',cancelled:'#3c4552'};
function validityDate(b){return addDays(new Date(b.createdAt),b.validityDays||15)}
function effectiveStatus(b,now=TODAY()){
  if(b.status!=='sent')return b.status;
  return validityDate(b)<now?'expired':b.status;
}
function pillHtml(status){return `<span class="pill ${STATUS_PILL[status]}">${STATUS_LABELS[status]}</span>`}
function isCurrentMonth(dateStr,now=TODAY()){
  if(!dateStr)return false;
  const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(dateStr);
  if(!m)return false;
  return Number(m[1])===now.getFullYear()&&Number(m[2])-1===now.getMonth();
}

function dashboardPage(){
  const period=document.getElementById('periodFilter')?.value||'all';
  const now=TODAY();
  let list=[...state.budgets];
  if(period==='30')list=list.filter(b=>new Date(b.createdAt)>=addDays(now,-30));
  if(period==='90')list=list.filter(b=>new Date(b.createdAt)>=addDays(now,-90));
  const withStatus=list.map(b=>({...b,eff:effectiveStatus(b,now)}));
  const emitted=withStatus.filter(b=>b.eff!=='draft');
  const answered=emitted.filter(b=>['approved','rejected'].includes(b.eff));
  const approved=emitted.filter(b=>b.eff==='approved');
  const sent=emitted.filter(b=>b.eff==='sent');
  const conversion=answered.length?Math.round(approved.length/answered.length*100):0;
  const approvedValue=approved.reduce((s,b)=>s+b.total,0);
  const counts=Object.fromEntries(STATUS_ORDER.map(s=>[s,withStatus.filter(b=>b.eff===s).length]));
  const max=Math.max(1,...Object.values(counts));
  const upcoming=withStatus.filter(b=>b.eff==='sent').sort((a,b)=>validityDate(a)-validityDate(b)).slice(0,4);
  const recent=[...withStatus].sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).slice(0,6);
  return `<div class="page-head"><div><h1>Painel</h1><p>Resumo comercial dos orçamentos — ${esc(state.company)}</p></div>
    <button class="btn primary" data-nav="new-budget">+ Novo orçamento</button></div>
    <div class="filters"><div class="field"><label>Período</label><select class="select" id="periodFilter" onchange="__RENDER__()"><option value="30">Últimos 30 dias</option><option value="90" selected>Últimos 90 dias</option><option value="all">Todo o período</option></select></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-label">Orçamentos emitidos</div><div class="stat-value">${emitted.length}</div><div class="stat-note">excluindo rascunhos</div></div>
      <div class="stat"><div class="stat-label">Taxa de conversão</div><div class="stat-value" style="color:#0d7a4f">${conversion}%</div><div class="stat-note">${approved.length} aprovados de ${answered.length} respondidos</div></div>
      <div class="stat"><div class="stat-label">Valor aprovado</div><div class="stat-value">${fmtMoney(approvedValue)}</div><div class="stat-note">soma dos orçamentos aprovados</div></div>
      <div class="stat"><div class="stat-label">Aguardando resposta</div><div class="stat-value">${sent.length}</div><div class="stat-note">enviados, sem retorno</div></div>
    </div>
    <div class="grid-2">
      <section class="card"><div class="card-pad"><h2 class="card-title">Orçamentos por situação</h2><p class="card-sub">Distribuição dos ${withStatus.length} orçamentos no período.</p>
        <div class="status-list">${STATUS_ORDER.map(s=>`<div class="status-row"><span class="pill ${STATUS_PILL[s]}">${STATUS_LABELS[s]}</span><div class="bar"><span style="width:${counts[s]/max*100}%;background:${STATUS_BAR[s]}"></span></div><strong>${counts[s]}</strong></div>`).join('')}</div>
      </div></section>
      <section class="card"><div class="card-pad"><h2 class="card-title">Propostas a acompanhar</h2><p class="card-sub">Enviadas, ainda dentro do prazo de validade.</p>
        <div class="alert-list">${upcoming.length?upcoming.map(b=>`<div class="alert"><div><strong>${b.number}</strong><small>${esc(b.client.name)}</small></div><div><strong>${fmtDate(validityDate(b))}</strong></div></div>`).join(''):'<div class="empty">Nenhuma proposta enviada em aberto.</div>'}</div>
      </div></section>
    </div>
    <section class="card"><div class="card-pad" style="display:flex;justify-content:space-between;align-items:center"><div><h2 class="card-title">Orçamentos recentes</h2><p class="card-sub">Últimas propostas criadas ou alteradas.</p></div><button class="btn sm" data-nav="budgets">Ver todos</button></div>
      <div class="table-wrap"><table class="table"><thead><tr><th>Número</th><th>Cliente / serviço</th><th>Emissão</th><th>Situação</th><th class="amount">Total</th></tr></thead>
      <tbody>${recent.map(b=>`<tr><td><strong>${b.number}</strong></td><td>${esc(b.client.name)}<br><small style="color:var(--muted)">${esc(b.tituloServico)}</small></td><td>${fmtDate(b.createdAt)}</td><td>${pillHtml(b.eff)}</td><td class="amount"><strong>${fmtMoney(b.total)}</strong></td></tr>`).join('')}</tbody></table></div>
    </section>`;
}

function syncNonIncluded(){
  const suggested=[...new Set(wizardState.services.flatMap(s=>s.sourceNonIncluded||[]))];
  const existing=new Map(wizardState.nonIncluded.filter(x=>!x.custom).map(x=>[x.original||x.text,x]));
  const custom=wizardState.nonIncluded.filter(x=>x.custom);
  wizardState.nonIncluded=suggested.map(t=>existing.get(t)||{id:uid('ni'),text:t,original:t,enabled:true,custom:false}).concat(custom);
}
function itemTotal(it){return Math.max(0,Number(it.qty)||0)*Math.max(0,Number(it.unitValue)||0)}
function feesSubtotalReais(){return (wizardState.items||[]).reduce((sum,it)=>sum+itemTotal(it),0)}
function costsSubtotalReais(){return (wizardState.additionalCosts||[]).reduce((sum,it)=>sum+itemTotal(it),0)}
function subtotalReais(){return feesSubtotalReais()+costsSubtotalReais()}
function totalReais(){return Math.max(0,subtotalReais()*(1-(Number(wizardState.closing.discount)||0)/100))}
function proposalTitle(){return wizardState.services.map(s=>s.title||s.name).filter(Boolean).join(' + ')||'PROPOSTA TÉCNICA E COMERCIAL'}

window.__TOGGLETPL__=(id)=>{
  const idx=wizardState.templateIds.indexOf(id);

};

window.__VIEW__=(id)=>{const b=state.budgets.find(x=>x.id===id);if(!b)return;if(b.demoProposal){wizardState=freshWizard();Object.assign(wizardState,{step:5,client:b.client,property:b.demoProposal.property,services:b.demoProposal.services,items:b.demoProposal.items||[],additionalCosts:b.demoProposal.additionalCosts||[],nonIncluded:b.demoProposal.nonIncluded||[],closing:b.demoProposal.closing,savedBudgetId:b.id,savedNumber:b.number});navigate('new-budget')}else{document.getElementById('content').innerHTML=existingBudgetDocumentHtml(b)}};

/* ================= MODELOS DE PROPOSTA ================= */
let templateDetailId=null;
function templatesPage(){
  if(templateDetailId)return templateDetailHtml(templateDetailId);
  const byCategory=TEMPLATES.reduce((acc,t)=>{(acc[t.category]??=[]).push(t);return acc},{});
  return `<div class="page-head"><div><h1>Modelos de proposta</h1><p>Textos padronizados combináveis, usados no assistente de novo orçamento.</p></div></div>
  ${Object.entries(byCategory).map(([cat,items])=>`<div style="margin-bottom:22px"><h2 style="font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--gold-ink);margin:0 0 10px">${cat}</h2>
  <div class="template-grid">${items.map(t=>`<div class="template-card"><div class="category">${t.category}</div><h3>${esc(t.nome)}</h3><p>${esc(t.objeto)}</p>
  <div class="actions"><button class="btn sm" onclick="__OPENTPL__('${t.id}')">Ver modelo completo</button></div></div>`).join('')}</div></div>`).join('')}`;
}
window.__OPENTPL__=(id)=>{templateDetailId=id;render()};
window.__CLOSETPL__=()=>{templateDetailId=null;render()};
function templateDetailHtml(id){
  const t=TEMPLATES.find(x=>x.id===id);
  const sections=[['objeto','Objeto'],['escopoServicos','Escopo dos serviços'],['metodologiaEntregaveis','Metodologia e entregáveis'],['prazoExecucao','Prazo de execução'],['formaPagamento','Forma de pagamento'],['naoIncluidos','Itens não inclusos'],['observacoes','Observações']];
  return `<div class="page-head"><div><h1>${esc(t.nome)}</h1><p>${esc(t.category)}</p></div><button class="btn" onclick="__CLOSETPL__()">← Voltar aos modelos</button></div>
  <div class="template-detail"><nav class="toc card">${sections.map(([key,label])=>`<button onclick="document.getElementById('sec-${key}').scrollIntoView({behavior:'smooth'})">${label}</button>`).join('')}</nav>
  <div class="card">${sections.map(([key,label])=>`<div class="text-section" id="sec-${key}"><h2>${label}</h2>${key==='objeto'?`<p>${esc(t[key])}</p>`:`<ul class="bullets">${t[key].split('\n').map(l=>`<li>${esc(l)}</li>`).join('')}</ul>`}</div>`).join('')}</div></div>`;
}

/* ================= PACOTES ================= */
function packagesPage(){
  return `<div class="page-head"><div><h1>Pacotes</h1><p>Conjuntos prontos de categorias, serviços e modelos por segmento de atuação.</p></div></div>
  <div class="package-grid">${PACKAGES.map(p=>`<div class="package-card"><h3>${p.name}</h3><div class="audience">${p.audience}</div><p style="color:var(--muted);margin:0 0 12px;font-size:13.5px">${p.shortDescription}</p><button class="btn sm">Aplicar pacote</button></div>`).join('')}</div>`;
}

/* ================= FINANCEIRO ================= */
let financeTab='overview';
function financePage(){
  const tabs=[['overview','Visão geral'],['receivables','Contas a receber'],['expenses','Despesas'],['settings','Contas e categorias']];
  const now=iso(TODAY());
  const openTotal=state.receivables.reduce((s,r)=>s+r.parcelas.reduce((s2,p)=>s2+Math.max(0,p.valor-p.pago),0),0);
  const overdue=state.receivables.reduce((s,r)=>s+r.parcelas.filter(p=>p.venc<now&&p.pago<p.valor).reduce((s2,p)=>s2+(p.valor-p.pago),0),0);
  const receivedMonth=state.receivables.flatMap(r=>r.parcelas).filter(p=>p.pago>0&&isCurrentMonth(p.pagoEm)).reduce((s,p)=>s+p.pago,0);
  const paidExpenses=state.expenses.filter(e=>e.pago&&isCurrentMonth(e.venc)).reduce((s,e)=>s+e.valor,0);
  const openExpenses=state.expenses.filter(e=>!e.pago).reduce((s,e)=>s+e.valor,0);
  let body='';
  if(financeTab==='overview'){
    body=`<div class="stats"><div class="stat"><div class="stat-label">A receber em aberto</div><div class="stat-value">${fmtMoney(openTotal)}</div></div>
    <div class="stat"><div class="stat-label">Recebimentos atrasados</div><div class="stat-value" style="color:#a3253c">${fmtMoney(overdue)}</div></div>
    <div class="stat"><div class="stat-label">Recebido no mês</div><div class="stat-value" style="color:#0d7a4f">${fmtMoney(receivedMonth)}</div></div>
    <div class="stat"><div class="stat-label">Despesas pagas no mês</div><div class="stat-value">${fmtMoney(paidExpenses)}</div></div></div>
    <section class="card"><div class="card-pad"><h2 class="card-title">Movimentações recentes</h2></div>
    <div class="table-wrap"><table class="table"><thead><tr><th>Data</th><th>Descrição</th><th class="amount">Valor</th></tr></thead><tbody>
    ${state.receivables.flatMap(r=>r.parcelas.filter(p=>p.pago>0).map(p=>({data:p.pagoEm||p.venc,desc:`${r.budgetNumber} — ${r.client}`,valor:p.pago})))
      .concat(state.expenses.filter(e=>e.pago).map(e=>({data:e.venc,desc:e.descricao,valor:-e.valor})))
      .sort((a,b)=>b.data.localeCompare(a.data)).map(m=>`<tr><td>${fmtDate(m.data)}</td><td>${esc(m.desc)}</td><td class="amount" style="color:${m.valor<0?'#a3253c':'#0d7a4f'}">${m.valor<0?'-':'+'}${fmtMoney(Math.abs(m.valor))}</td></tr>`).join('')}
    </tbody></table></div></section>`;
  } else if(financeTab==='receivables'){
    body=`<div class="card"><div class="card-pad"><h2 class="card-title">Contas a receber</h2><p class="card-sub">Parcelas vinculadas a cada orçamento aprovado.</p>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px">${state.receivables.map((r,ri)=>{
      const total=r.parcelas.reduce((s,p)=>s+p.valor,0),pago=r.parcelas.reduce((s,p)=>s+p.pago,0);
      const st=pago>=total?'approved':pago>0?'sent':(r.parcelas.some(p=>p.venc<now)?'rejected':'draft');
      const label=pago>=total?'Pago':pago>0?'Parcial':(r.parcelas.some(p=>p.venc<now)?'Atrasado':'Em aberto');
      return `<details style="border:1px solid var(--line);border-radius:10px;padding:11px 13px"><summary style="cursor:pointer;list-style:none;display:flex;justify-content:space-between"><span><strong>${r.budgetNumber}</strong> — ${esc(r.client)}</span><span>${fmtMoney(total)} <span class="pill ${STATUS_PILL[st]||'pill-draft'}">${label}</span></span></summary>
      ${r.parcelas.map((p,pi)=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid #f0ece1;font-size:13px"><span>Parcela ${p.n}/${r.parcelas.length} · vence ${fmtDate(p.venc)} · saldo ${fmtMoney(p.valor-p.pago)}</span>${p.pago<p.valor?`<button class="btn sm" onclick="__RECEIVE__(${ri},${pi})">Receber</button>`:`<button class="btn link" onclick="__UNRECEIVE__(${ri},${pi})">Apagar lançamento</button>`}</div>`).join('')}
      </details>`}).join('')}</div></div></div>`;
  } else if(financeTab==='expenses'){
    body=`<div class="card"><div class="card-pad"><h2 class="card-title">Despesas</h2></div><div class="table-wrap"><table class="table"><thead><tr><th>Descrição</th><th>Vencimento</th><th class="amount">Valor</th><th>Situação</th></tr></thead><tbody>
    ${state.expenses.map(e=>`<tr><td>${esc(e.descricao)}</td><td>${fmtDate(e.venc)}</td><td class="amount">${fmtMoney(e.valor)}</td><td>${e.pago?'<span class="pill pill-approved">Paga</span>':'<span class="pill pill-sent">Em aberto</span>'}</td></tr>`).join('')}
    </tbody></table></div></div>`;
  } else {
    body=`<div class="grid-2"><section class="card"><div class="card-pad"><h2 class="card-title">Contas financeiras</h2><p class="card-sub">Conta principal · PIX, boleto e transferência.</p></div></section>
    <section class="card"><div class="card-pad"><h2 class="card-title">Categorias de despesas</h2><p class="card-sub">Aluguel, materiais, internet, impostos.</p></div></section></div>`;
  }
  return `<div class="page-head"><div><h1>Financeiro</h1><p>Contas a receber, pagamentos, despesas e fluxo de caixa.</p></div></div>
  <div class="filters" style="gap:6px">${tabs.map(([k,l])=>`<button class="btn ${financeTab===k?'primary':''} sm" onclick="__FINTAB__('${k}')">${l}</button>`).join('')}</div>
  ${body}`;
}
window.__FINTAB__=(k)=>{financeTab=k;render()};
window.__RECEIVE__=(ri,pi)=>{const p=state.receivables[ri].parcelas[pi];p.pago=p.valor;p.pagoEm=iso(TODAY());save();toast('Recebimento registrado.');render()};
window.__UNRECEIVE__=(ri,pi)=>{const p=state.receivables[ri].parcelas[pi];p.pago=0;p.pagoEm=null;save();toast('Lançamento apagado.');render()};

/* ================= CONFIGURAÇÕES ================= */
function settingsPage(){
  return `<div class="page-head"><div><h1>Configurações</h1><p>Dados da empresa ativa, responsáveis e catálogo.</p></div></div>
  <div class="grid-2"><section class="card"><div class="card-pad"><h2 class="card-title">Empresa ativa</h2>
    <div class="field" style="margin-top:12px"><label>Nome da empresa</label><input class="input" value="${esc(state.company)}" onchange="state.company=this.value;save();toast('Configurações salvas.')"></div>
    <div class="field" style="margin-top:10px"><label>Responsável técnico</label><input class="input" value="Ana Beatriz Meridiano — CAU A00000-0" disabled></div>
  </div></section>
  <section class="card"><div class="card-pad"><h2 class="card-title">Backup e dados</h2><p class="card-sub">Os dados desta demonstração ficam somente neste navegador.</p>
    <button class="btn danger" style="margin-top:14px" onclick="__RESTORE__()">Restaurar dados fictícios</button>
  </div></section></div>`;
}
window.__RESTORE__=()=>{state=defaultState();save();toast('Demonstração restaurada.');render()};

/* ================= LICENÇA ================= */
function licensePage(){
  return `<div class="page-head"><div><h1>Licença do Total Obras</h1><p>Plano, validade, computadores e módulos liberados.</p></div>
  <div style="display:flex;gap:8px"><button class="btn">Validar agora</button><button class="btn danger">Desativar computador</button></div></div>
  <div class="stats"><div class="stat"><div class="stat-label">Plano</div><div class="stat-value">${LICENSE.plan}</div></div>
  <div class="stat"><div class="stat-label">Situação</div><div class="stat-value" style="color:#0d7a4f">${LICENSE.situacao}</div></div>
  <div class="stat"><div class="stat-label">Empresas</div><div class="stat-value">${LICENSE.empresas}</div></div>
  <div class="stat"><div class="stat-label">Computadores</div><div class="stat-value">${LICENSE.computadores}</div></div></div>
  <div class="grid-2"><section class="card"><div class="card-pad"><h2 class="card-title">Informações</h2>
  <div style="display:grid;grid-template-columns:auto 1fr;gap:8px 16px;font-size:13.5px;margin-top:10px">
  <span style="color:var(--muted)">Cliente</span><strong>${LICENSE.cliente}</strong>
  <span style="color:var(--muted)">Offline até</span><span>${LICENSE.offlineAte}</span>
  <span style="color:var(--muted)">Computador</span><span>${LICENSE.computador}</span>
  <span style="color:var(--muted)">Última validação</span><span>${LICENSE.ultimaValidacao}</span>
  <span style="color:var(--muted)">Proteção local</span><span>Assinatura verificada automaticamente</span>
  </div></div></section>
  <section class="card"><div class="card-pad"><h2 class="card-title">Módulos do plano</h2>
  <div class="module-grid" style="margin-top:10px">${Object.entries(FEATURE_NAMES).map(([code,name])=>{const on=ENABLED_FEATURES.includes(code);return `<div class="module-item ${on?'on':'off'}">${on?'✓':'—'} ${name}</div>`}).join('')}</div>
  </div></section></div>`;
}

/* ================= NAVEGAÇÃO / RENDER ================= */
function navigate(page){currentPage=page;document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.page===page));render();window.scrollTo({top:0,behavior:'smooth'});closeMobile()}
function render(){
  const c=document.getElementById('content');
  c.innerHTML=currentPage==='dashboard'?dashboardPage()
    :currentPage==='budgets'?budgetsPage()
    :currentPage==='new-budget'?newBudgetPage()
    :currentPage==='templates'?templatesPage()
    :currentPage==='packages'?packagesPage()
    :currentPage==='finance'?financePage()
    :currentPage==='settings'?settingsPage()
    :currentPage==='licenca'?licensePage():dashboardPage();
  c.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>navigate(el.dataset.nav));
}
function renderInto(){render()}
window.__RENDER__=render;
window.render=render;window.navigate=navigate;window.wizardState=wizardState;window.state=state;

document.querySelectorAll('.nav-item[data-page]').forEach(b=>b.addEventListener('click',()=>navigate(b.dataset.page)));
document.querySelector('.license-pill').addEventListener('click',(e)=>{e.preventDefault();navigate('licenca')});
const sidebar=document.getElementById('sidebar');
document.getElementById('collapse').onclick=()=>{sidebar.classList.toggle('collapsed');try{localStorage.setItem('total-obras-demo-sidebar',sidebar.classList.contains('collapsed')?'1':'0')}catch(e){}};
try{if(localStorage.getItem('total-obras-demo-sidebar')==='1')sidebar.classList.add('collapsed')}catch(e){}
const overlay=document.getElementById('overlay');
document.getElementById('mobileMenu').onclick=()=>{sidebar.classList.add('mobile-open');overlay.classList.remove('hidden')};
overlay.onclick=closeMobile;function closeMobile(){sidebar.classList.remove('mobile-open');overlay.classList.add('hidden')}
document.getElementById('companySelect').onchange=(e)=>{state.company=e.target.value;save();render()};

render();
})();
</script>
