.status-list{display:flex;flex-direction:column;gap:10px;margin-top:14px}.status-row{display:grid;grid-template-columns:105px 1fr 34px;gap:10px;align-items:center}.status-button{border:0;border-radius:999px;padding:6px 9px;font-size:11px;font-weight:900;text-align:left}.bar{height:10px;background:#ece7df;border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;background:var(--blue)}.bar.approved span{background:var(--green)}.bar.draft span{background:#7a8795}.bar.rejected span{background:var(--red)}.bar.expired span{background:var(--amber)}.alert-list{display:flex;flex-direction:column;gap:9px;margin-top:12px}.alert{padding:11px;border:1px solid #eee7dc;border-radius:10px;display:flex;justify-content:space-between;gap:12px}.alert small{display:block;color:var(--muted)}

<script>

s cartorárias\nTaxas de órgãos públicos ou de conselhos profissionais\nART/RRT, salvo quando expressamente incluída\nRegularização de edificações, habite-se ou projetos de construção\nCorreções decorrentes de documentos incorretos, incompletos ou divergentes\nServiços adicionais solicitados após aprovação da proposta","observacoes":"A execução do serviço está condicionada à regularidade e suficiência dos documentos apresentados\nCaso sejam identificadas inconsistências documentais, cadastrais, registrais ou geométricas que impeçam o protocolo ou exijam serviço complementar, o contratante será informado previamente\nExigências posteriores serão analisadas e classificadas\nCorreções decorrentes de erro técnico do serviço contratado serão atendidas sem cobrança adicional\nAlterações de escopo, documentos novos ou serviços não previstos poderão gerar orçamento complementar","validityDays":15},{"id":"instituicao_condominio","nome":"Instituição de Condomínio Edilício","category":"Serviços SIG-RI / Cartório","tituloServicoSugerido":"INSTITUIÇÃO DE CONDOMÍNIO EDILÍCIO","objeto":"Prestação de serviços técnicos para análise, elaboração e organização da documentação necessária à instituição de condomínio edilício, com individualização das unidades autônomas, identificação das áreas de uso comum, cálculo das frações ideais e preparação dos documentos técnicos destinados ao registro imobiliário.","escopoServicos":"Análise da matrícula e da situação registral do imóvel\nConferência do projeto arquitetônico aprovado e dos documentos da edificação\nVerificação da correspondência entre o projeto aprovado, a edificação existente e a matrícula do imóvel\nIdentificação e individualização das unidades autônomas\nIdentificação das áreas privativas, áreas comuns e áreas totais\nIdentificação das vagas de garagem, depósitos, áreas técnicas e demais áreas vinculadas às unidades\nCálculo das frações ideais correspondentes ao terreno e às partes comuns\nDefinição da destinação de cada unidade para protocolo","naoIncluidos":"Taxas e emolumentos do Cartório de Registro de Imóveis\nTaxas municipais, estaduais ou federais\nCertidões emitidas por órgãos públicos ou cartórios\nLevantamento topográfico\nLevantamento arquitetônico da edificação existente\nRegularização de alterações executadas em desacordo com o projeto aprovado\nAprovação ou alteração de projeto perante a Prefeitura\nAverbação da construção\nRetificação de matrícula, área, medidas ou confrontações\nDesmembramento, remembramento ou unificação de imóveis\nIncorporação imobiliária\nElaboração de projetos arquitetônicos ou complementares\nLaudos estruturais, elétricos, hidrossanitários ou de segurança\nElaboração jurídica da convenção de condomínio\nElaboração de regimento interno\nServiços advocatícios, contábeis ou notariais\nReconhecimento de firmas, autenticações e procurações\nDeslocamentos e serviços fora do município inicialmente considerado\nReexecução dos documentos em razão de alterações posteriores solicitadas pelo contratante","observacoes":"A contratação compreende a elaboração da documentação técnica descrita no escopo\nA minuta jurídica da convenção de condomínio deverá ser elaborada ou revisada por profissional habilitado na área jurídica\nA aprovação e o registro dependem da análise do Cartório de Registro de Imóveis e do cumprimento das exigências específicas apresentadas durante o processo\nAlterações no projeto, na quantidade de unidades, nas áreas ou na configuração do empreendimento após o início dos serviços poderão gerar revisão do prazo e dos honorários\nO contratante é responsável pela autenticidade, validade e precisão dos documentos e informações fornecidos\nExigências decorrentes de problemas anteriores na matrícula, na construção ou no projeto aprovado poderão ser objeto de orçamento complementar","validityDays":15},{"id":"desmembramento_urbano","nome":"Desmembramento urbano","category":"Serviços SIG-RI / Cartório","tituloServicoSugerido":"DESMEMBRAMENTO DE IMÓVEL URBA rização de domínio\nRetificação de matrícula\nExtinção de condomínio\nIndividualização de frações ideais\nLevantamento de edificações\nProjetos de regularização, demolição ou aprovação de construções existentes\nLevantamento topográfico, salvo quando expressamente incluído\nAlterações solicitadas após aprovação da proposta","observacoes":"O orçamento considera o desmembramento do imóvel conforme a quantidade de lotes indicada, sem abertura, prolongamento ou modificação do sistema viário\nA aprovação dependerá da viabilidade urbanística, regularidade documental e anuências exigidas\nCaso o município, cartório ou outro órgão solicite serviço não previsto, será apresentado orçamento complementar","validityDays":15},{"id":"remembramento_unificacao","nome":"Remembramento / unificação","category":"Serviços SIG-RI / Cartório","tituloServicoSugerido":"REMEMBRAMENTO E UNIFICAÇÃO DE IMÓVEIS URBANOS","objeto":"Prestação de serviços técnicos para elaboração do projeto de remembramento e unificação de imóveis urbanos, com fusão das matrículas envolvidas em uma única unidade imobiliária, observando cadastro imobiliário, parâmetros urbanísticos, legislação municipal vigente e exigências dos órgãos competentes.","escopoServicos":"Análise das matrículas e documentos fornecidos pelo contratante\nVerificação de confrontações, dimensões e consistência cadastral\nConsulta aos parâmetros urbanísticos aplicáveis\nElaboração da planta de situação e localização\nElaboração da planta de remembramento/unificação\nQuadro de áreas e confrontações do imóvel resultante\nElaboração do memorial descritivo do imóvel unificado\nElaboração dos arquivos técnicos digitais necessários\nEmissão de RRT, quando incluída\nProtocolo e acompanhamento técnico junto à Prefeitura ou Cartório, quando incluído","metodologiaEntregaveis":"Recebimento e conferência das matrículas e documentos fornecidos\nVerificação de confrontações, dimensões e consistência cadastral\nElaboração da planta de situação, localização e r ação dos documentos técnicos exigidos\nEmissão de ART/RRT complementar, quando necessário\nProtocolo de resposta à exigência no Cartório de Registro de Imóveis, quando incluído","metodologiaEntregaveis":"Recebimento e análise da nota devolutiva e documentação existente\nIdentificação técnica das correções necessárias\nElaboração ou adequação dos documentos técnicos exigidos\nProtocolo de resposta à exigência, quando incluído","prazoExecucao":"Prazo estimado para execução dos serviços: 7 dias úteis, contados a partir da entrega integral da documentação necessária pelo contratante e da confirmação da contratação.\nO prazo de análise, aprovação ou protocolo perante o Cartório de Registro de Imóveis não integra o prazo de execução.","formaPagamento":"50% dos honorários profissionais na contratação\n50% dos honorários profissionais na entrega dos documentos/comprovantes contratados","naoIncluidos":"Emolumentos e despesas cartorárias\nServiços jurídicos\nNovas exigências decorrentes de análise posterior do cartório\nServiços que extrapolem o escopo da nota devolutiva apresentada\nAlterações solicitadas após aprovação da proposta","observacoes":"O escopo deste orçamento está limitado à exigência constante na nota devolutiva apresentada\nNovas exigências geradas pela análise subsequente do cartório, caso ocorram, serão analisadas e, se necessário, orçadas separadamente","validityDays":15},{"id":"regularizacao_documental","nome":"Regularização documental","category":"Serviços SIG-RI / Cartório","tituloServicoSugerido":"REGULARIZAÇÃO DOCUMENTAL DO IMÓVEL","objeto":"Prestação de serviços técnicos para regularização documental do imóvel, com análise da cadeia dominial, identificação de pendências registrais, cadastrais e documentais, e elaboração dos instrumentos técnicos necessários ao saneamento das irregularidades identificadas.","escopoServicos":"Análise da cadeia dominial e matrícula do imóvel\nLevantamento das pendências registrais, cadastrais e documentais\nElaboração de ar, anteprojeto e projeto executivo, observando o programa de necessidades do contratante, a legislação municipal aplicável e as normas técnicas vigentes.","escopoServicos":"Levantamento do programa de necessidades junto ao contratante\nAnálise do terreno, da legislação urbanística e dos parâmetros construtivos aplicáveis\nElaboração do estudo preliminar, com plantas, cortes e volumetria inicial\nElaboração do anteprojeto arquitetônico\nElaboração do projeto executivo, com plantas, cortes, fachadas e detalhamentos necessários à execução da obra\nCompatibilização com os projetos complementares, quando fornecidos pelo contratante ou por terceiros\nElaboração dos memoriais descritivos do projeto arquitetônico\nProtocolo do projeto para aprovação junto à Prefeitura Municipal, quando incluído","metodologiaEntregaveis":"Reunião inicial para levantamento do programa de necessidades\nElaboração e apresentação do estudo preliminar para validação do contratante\nDesenvolvimento do anteprojeto a partir do estudo preliminar aprovado\nDesenvolvimento do projeto executivo e dos memoriais descritivos\nEntrega dos arquivos técnicos digitais e, quando incluído, protocolo para aprovação","prazoExecucao":"Prazo estimado para execução dos serviços: 20 dias úteis, contados a partir da entrega integral da documentação necessária pelo contratante e da confirmação da contratação.\nO prazo de análise, aprovação ou protocolo perante a Prefeitura Municipal ou demais órgãos de aprovação não integra o prazo de execução.","formaPagamento":"50% dos honorários profissionais na contratação\n50% dos honorários profissionais na entrega dos documentos/comprovantes contratados","naoIncluidos":"Levantamento topográfico\nSondagem do solo\nProjetos complementares (estrutural, elétrico, hidrossanitário, PSCIP, acessibilidade), salvo quando expressamente incluídos\nTaxas de aprovação, ART/RRT de terceiros e despesas de órgãos públicos\nExecução da obra, acompanhamento de obra ou assistência técnica de execução, salvo quando expressamente incluídos\nAlterações de projeto solicitadas após a aprovação do anteprojeto","observacoes":"O projeto é desenvolvido com base no programa de necessidades e nas informações fornecidas pelo contratante\nAlterações de escopo ou de programa após a aprovação de cada etapa poderão gerar orçamento complementar\nA aprovação do projeto junto aos órgãos competentes depende da regularidade documental do imóvel","validityDays":15},{"id":"regularizacao_edificacao","nome":"Regularização de Edificação","category":"Projetos complementares","tituloServicoSugerido":"REGULARIZAÇÃO DE EDIFICAÇÃO","objeto":"Prestação de serviços técnicos para regularização de edificação existente, com comparação entre a área aprovada e a área efetivamente construída, identificação das divergências e elaboração das peças técnicas necessárias à sua legalização junto aos órgãos competentes.","escopoServicos":"Análise da matrícula, do Habite-se, do cadastro imobiliário, dos projetos existentes e dos demais documentos fornecidos pelo contratante\nConferência da área aprovada e da área existente in loco, com identificação da área a regularizar\nElaboração das peças técnicas necessárias à regularização, incluindo planta, quadro de áreas e informações técnicas complementares\nCompatibilização da edificação existente com a situação documental apresentada pelo contratante\nElaboração do memorial descritivo da regularização\nEmissão de ART/RRT do responsável técnico\nProtocolo junto à Prefeitura Municipal, quando incluído","metodologiaEntregaveis":"Recebimento e conferência da documentação do imóvel e da edificação existente\nLevantamento e análise da diferença entre a área aprovada e a área existente in loco\nElaboração das peças técnicas de regularização\nElaboração do memorial descritivo e do quadro de áreas\nProtocolo junto ao órgão competente, quando incluído","prazoExecucao":"Prazo estimado para execução dos serviços: 20 a 35 dias úteis, contados a partir da entrega integral function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}function dateBR(v){if(!v)return'—';let [y,m,d]=v.split('-');return`${d}/${m}/${y}`}function nl(v){return String(v||'').split('\n').map(x=>x.trim()).filter(Boolean)}function paragraphs(v){return nl(v).map(x=>`<p>${esc(x)}</p>`).join('')}function bullets(v){return `<ul class="bullets">${nl(v).map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`}
const statusNames={approved:'Aprovado',sent:'Enviado',draft:'Rascunho',rejected:'Recusado',expired:'Expirado'};function badge(s){return `<span class="badge ${s}">${statusNames[s]||s}</span>`}function client(id){return data.clients.find(x=>x.id===id)||data.clients[0]}function template(id){return TEMPLATES.find(x=>x.id===id)||TEMPLATES[0]}function total(b){let sub=(b.honorarios||[]).reduce((s,x)=>s+Number(x.value||0),0);return sub*(1-Number(b.discountPercent||0)/100)}
function fullBudget(b){const t=template(b.templateId);return {...t,...b,objeto:b.objeto??t.objeto,escopoServicos:b.escopoServicos??t.escopoServicos,metodologiaEntregaveis:b.metodologiaEntregaveis??t.metodologiaEntregaveis,prazoExecucao:b.prazoExecucao??t.prazoExecucao,formaPagamento:b.formaPagamento??t.formaPagamento,naoIncluidos:b.naoIncluidos??t.naoIncluidos,observacoes:b.observacoes??t.observacoes,validityDays:b.validityDays??t.validityDays,title:b.title||t.tituloServicoSugerido}}

function dashboard(){let list=[...data.budgets];if(dashStatus!=='all')list=list.filter(b=>b.status===dashStatus);const emitted=list.filter(b=>b.status!=='draft'),answered=emitted.filter(b=>['approved','rejected'].includes(b.status)),approved=emitted.filter(b=>b.status==='approved'),sent=emitted.filter(b=>b.status==='sent');const conv=answered.length?Math.round(approved.length/answered.length*100):0;const status=['approved','sent','draft','rejected','expired'],counts=Object.fromEntries(status.map(s=>[s,list.filter(b=>b.status===s).length])),mx=Math.max(1,...Object.values(counts));return `<div class="page-head"><div><h1>Painel</h1><p>Controle visual dos orçamentos, conversão e propostas em acompanhamento.</p></div><div class="actions"><button class="btn" data-action="clear-dashboard">Limpar filtro</button><button class="btn primary" data-action="new-budget">+ Novo orçamento</button></div></div><div class="stats"><button class="stat" data-dash="all"><div class="stat-label">Orçamentos emitidos</div><div class="stat-value">${emitted.length}</div><div class="stat-note">excluindo rascunhos</div></button><button class="stat" data-dash="approved"><div class="stat-label">Taxa de conversão</div><div class="stat-value" style="color:var(--green)">${conv}%</div><div class="stat-note">${approved.length} aprovados de ${answered.length} respondidos</div></button><button class="stat" data-dash="approved"><div class="stat-label">Valor aprovado</div><div class="stat-value">${money(approved.reduce((s,b)=>s+total(b),0))}</div><div class="stat-note">honorários aprovados</div></button><button class="stat" data-dash="sent"><div class="stat-label">Aguardando resposta</div><div class="stat-value">${sent.length}</div><div class="stat-note">propostas enviadas sem retorno</div></button></div><div class="grid-2"><section class="card"><div class="card-pad"><h2 class="card-title">Orçamentos por status</h2><p class="card-sub">Clique no status para filtrar o painel.</p><div class="status-list">${status.map(s=>`<div class="status-row"><button class="status-button ${s}" data-dash="${s}">${statusNames[s]}</button><div class="bar ${s}"><span style="width:${counts[s]/mx*100}%"></span></div><strong>${counts[s]}</strong></div>`).join('')}</div></div></section><section class="card"><div class="card-pad"><h2 class="card-title">Propostas a acompanhar</h2><p class="card-sub">Enviadas ou em rascunho próximas da validade.</p><div class="alert-list">${list.filter(b=>['sent','draft'].includes(b.status)).sort((a,b)=>a.validUntil.localeCompare(b.validUntil)).slice(0,5).map(b=>`<button class="alert" data-action="view-budget" data-id="${b.id}"><span><strong>${esc(b.number)}</strong><small>${esc(client(b.clientId).name)}</small></span><strong style="color:var(--amber)">${dateBR(b.validUntil)}</strong></button>`).join('')||'<div class="empty">Nenhuma proposta pendente.</div>'}</div></div></section></div>${budgetTable(list.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6),'Orçamentos recentes')}`}
function budgetTable(list,title='Orçamentos'){return `<section class="card"><div class="card-pad"><h2 class="card-title">${title}</h2><p class="card-sub">Visualize o documento montado ou edite o conteúdo da proposta.</p></div><div class="table-wrap"><table class="table"><thead><tr><th>Número</th><th>Cliente</th><th>Serviço</th><th>Validade</th><th class="amount">Valor</th><th>Status</th><th>Ações</th></tr></thead><tbody>${list.map(b=>`<tr><td><strong>${esc(b.number)}</strong><br><small>${dateBR(b.date)}</small></td><td>${esc(client(b.clientId).name)}</td><td>${esc(fullBudget(b).title)}</td><td>${dateBR(b.validUntil)}</td><td class="amount"><strong>${money(total(b))}</strong></td><td>${badge(b.status)}</td><td><div class="toolbar"><button class="btn sm primary" data-action="view-budget" data-id="${b.id}">Visualizar</button><button class="btn sm" data-action="edit-budget" data-id="${b.id}">Editar</button><button class="btn sm" data-action="duplicate-budget" data-id="${b.id}">Duplicar</button></div></td></tr>`).join('')||'<tr><td colspan="7" class="empty">Nenhum orçamento encontrado.</td></tr>'}</tbody></table></div></section>`}

function editorPage(id,templateId){let b=id?fullBudget(data.budgets.find(x=>x.id===id)):null;const t=template(templateId||b?.templateId||'instituicao_condominio'),c=b?client(b.clientId):data.clients[0],prop=b?.property||{};return `<div class="page-head"><div><h1>${id?'Editar orçamento':'Novo orçamento'}</h1><p>Selecione um modelo e ajuste os textos antes de visualizar a proposta.</p></div><div class="actions"><button class="btn" data-page="budgets">Cancelar</button>${id?`<button class="btn" data-action="view-budget" data-id="${id}">Visualizar atual</button>`:''}<button class="btn primary" data-action="save-budget" data-id="${id||''}">Salvar e visualizar</button></div></div><form id="budgetForm"><details class="form-section" open><summary>1. Identificação e modelo</summary><div class="form-body form-grid"><div class="field"><label>Cliente</label><select name="clientId" class="select">${data.clients.map(x=>`<option value="${x.id}" ${x.id===c.id?'selected':''}>${esc(x.name)}</option>`).join('')}</select></div><div class="field"><label>Modelo descritivo</label><select id="editorTemplate" name="templateId" class="select">${TEMPLATES.map(x=>`<option value="${x.id}" ${x.id===t.id?'selected':''}>${esc(x.nome)}</option>`).join('')}</select></div><div class="field span-2"><label>Título do serviço</label><input name="title" class="input" value="${esc(b?.title||t.tituloServicoSugerido)}"></div><div class="field"><label>Status</label><select name="status" class="select">${Object.entries(statusNames).map(([k,v])=>`<option value="${k}" ${(b?.status||'draft')===k?'selected':''}>${v}</option>`).join('')}</select></div><div class="field"><label>Responsável</label><input name="responsible" class="input" value="${esc(b?.responsible||data.responsible)}"></div><div class="field"><label>Data de emissão</label><input name="date" type="date" class="input" value="${b?.date||TODAY()}"></div><div class="field"><label>Validade</label><input name="validUntil" type="date" class="input" value="${b aPagamento??t.formaPagamento)}${textEditor('8. Não Estão Inclusos','naoIncluidos',b?.naoIncluidos??t.naoIncluidos)}${textEditor('9. Observações','observacoes',b?.observacoes??t.observacoes)}<div class="actions" style="justify-content:flex-end"><button type="button" class="btn primary" data-action="save-budget" data-id="${id||''}">Salvar e visualizar</button></div></form>`}

function previewPage(id){const raw=data.budgets.find(x=>x.id===id);if(!raw)return'<div class="empty">Orçamento não encontrado.</div>';const b=fullBudget(raw),c=client(b.clientId),p=b.property||{};const subtotal=(b.honorarios||[]).reduce((s,x)=>s+Number(x.value||0),0),grand=total(b);return `<div class="page-head no-print"><div><h1>${esc(b.number)}</h1><p>Visualização do orçamento montado, exatamente como será apresentado ao cliente.</p></div><div class="actions"><button class="btn" data-page="budgets">← Orçamentos</button><button class="btn" data-action="edit-budget" data-id="${b.id}">Editar</button><button class="btn primary" data-action="print-budget">Imprimir / PDF</button></div></div><div class="document-shell"><article class="document"><header class="doc-head"><div class="doc-logo"><span class="doc-logo-mark"></span><div><div class="doc-company">${esc(data.company.name)}</div><div class="doc-muted">${esc(data.company.cau)}</div><div class="doc-muted">${esc(data.company.address)} · ${esc(data.company.phone)}</div></div></div><div style="text-align:right"><strong style="font-size:19px">Orçamento</strong><div class="doc-muted">${esc(b.number)}</div><div class="doc-muted">Emitido em ${dateBR(b.date)}</div><div class="doc-muted">Válido até ${dateBR(b.validUntil)}</div></div></header><h1 class="doc-title">Especificação e Orçamento de Prestação de Serviço</h1><section class="doc-info"><div><span class="doc-label">Cliente</span>${esc(c.name)}</div><div><span class="doc-label">CPF/CNPJ</span>${esc(c.document)}</div><div><span class="doc-label">Telefone</span>${esc(c.phone)}</div><div><span class="doc-label">E-mail</span>${esc(c.email)}</div><div class="wide"><span class="doc-label">Endereço do cliente</span>${esc(c.address)}</div><div class="wide"><span class="doc-label">Características do serviço</span><strong>${esc(b.title)}</strong></div>${p.matricula?`<div><span class="doc-label">Matrícula</span>${esc(p.matricula)}</div>`:''}${p.loteIdentificacao?`<div><span class="doc-label">Lote/Quadra</span>${esc(p.loteIdentificacao)}</div>`:''}${p.landArea?`<div><span class="doc-label">Área do terreno</span>${Number(p.landArea).toLocaleString('pt-BR')} m²</div>`:''}${p.buildingArea?`<div><span class="doc-label">Área construída</span>${Number(p.buildingArea).toLocaleString('pt-BR')} m²</div>`:''}${p.address?`<div class="wide"><span class="doc-label">Endereço do imóvel</span>${esc(p.address)}</div>`:''}</section>${docSection('1. Objeto',paragraphs(b.objeto))}${docSection('2. Escopo dos Serviços',bullets(b.escopoServicos))}${docSection('3. Metodologia e Entregáveis',bullets(b.metodologiaEntregaveis))}${docSection('4. Prazo de Execução',paragraphs(b.prazoExecucao))}<section class="doc-section"><h2>5. Honorários</h2><table class="doc-table"><thead><tr><th>Descrição</th><th>Base de cálculo</th><th class="right">Valor</th></tr></thead><tbody>${(b.honorarios||[]).map(x=>`<tr><td>${esc(x.description)}</td><td>${esc(x.calculationBase)}</td><td class="right">${money(x.value)}</td></tr>`).join('')}${b.discountPercent>0?`<tr><td colspan="2">Subtotal</td><td class="right">${money(subtotal)}</td></tr><tr><td colspan="2">Desconto (${b.discountPercent}%)</td><td class="right">-${money(subtotal-grand)}</td></tr>`:''}<tr class="doc-total"><td colspan="2">VALOR TOTAL DOS SERVIÇOS TÉCNICOS</td><td class="right">${money(grand)}</td></tr></tbody></table></section>${(b.custosTerceiros||[]).length?`<section class="doc-section"><h2>6. Custos de Taxas, RRT e Matrículas</h2><table class="doc-table">${b.custosTerceiros.map(x=>`<tr><td>${esc(x.description)}</td><td class="right">${esc(x.valueOrCondition)}</td></tr>`).join('')}</table></section>`:''}${docSection('7. Forma de Pagamento',bullets(b.formaPagamento))}${docSection('8. Não Estão Inclusos',bullets(b.naoIncluidos))}${docSection('9. Observações',bullets(b.observacoes+'\nProposta válida por '+b.validityDays+' dias.'))}<div class="signatures"><div class="signature">Aceito o Orçamento Proposto Mediante Assinatura</div><div class="signature">Local e Data</div></div><footer class="doc-footer"><strong>${esc(data.responsible)}</strong><br>Arquiteto e Urbanista · ${esc(data.company.phone)} · ${esc(data.company.email)}</footer></article></div>`}

function financePage(){const open=data.receivables.reduce((s,r)=>s+Math.max(0,r.value-r.paid),0),rec=data.receivables.reduce((s,r)=>s+r.paid,0),exp=data.expenses.reduce((s,r)=>s+r.value,0);return `<div class="page-head"><div><h1>Financeiro</h1><p>Contas vinculadas aos orçamentos demonstrativos.</p></div></div><div class="kpis"><div class="kpi"><span>Saldo a receber</span><strong>${money(open)}</strong></div><div class="kpi"><span>Recebido</span><strong style="color:var(--green)">${money(rec)}</strong></div><div class="kpi"><span>Despesas</span><strong style="color:var(--red)">${money(exp)}</strong></div></div><section class="card" style="margin-top:18px"><div class="table-wrap"><table class="table"><thead><tr><th>Vencimento</th><th>Conta</th><th>Cliente</th><th class="amount">Valor</th><th class="amount">Saldo</th><th>Situação</th></tr></thead><tbody>${data.receivables.map(r=>{let bal=Math.max(0,r.value-r.paid),st=bal===0?'paid':r.due<TODAY()?'late':'open';return`<tr><td>${dateBR(r.due)}</td><td><strong>${esc(r.description)}</strong></td><td>${esc(client(r.clientId).name)}</td><td class="amount">${money(r.value)}</td><td class="amount">${money(bal)}</td><td><span class="badge ${st}">${st==='paid'?'Pago':st==='late'?'Atrasado':'Em aberto'}</span></td></tr>`}).join('')}</tbody></table></div></section>`}

function render(){const c=document.getElementById('content');c.innerHTML=page==='dashboard'?dashboard():page==='budgets'?budgetsPage():page==='clients'?clientsPage():page==='services'?servicesPage():page==='templates'?templatesPage():page==='template-detail'?templateDetail(selectedId):page==='editor'?editorPage(selectedId?.budgetId,selectedId?.templateId):page==='preview'?previewPage(selectedId):page==='finance'?financePage():settingsPage();bind()}
function bind(){document.querySelectorAll('[data-page]').forEach(x=>x.onclick=()=>setPage(x.dataset.page));document.querySelectorAll('[data-action]').forEach(x=>x.onclick=()=>action(x.dataset.action,x.dataset.id));document.querySelectorAll('[data-dash]').forEach(x=>x.onclick=()=>{dashStatus=x.dataset.dash;setPage('dashboard')});document.querySelectorAll('[data-scroll]').forEach(x=>x.onclick=()=>document.getElementById(x.dataset.scroll)?.scrollIntoView({behavior:'smooth'}));const q=document.getElementById('budgetSearch'),s=document.getElementById('budgetStatus');if(q||s){const f=()=>{let v=(q?.value||'').toLowerCase(),st=s?.value||'all';let l=data.budgets.filter(b=>(st==='all'||b.status===st)&&[b.number,client(b.clientId).name,fullBudget(b).title].join(' ').toLowerCase().includes(v));document.getElementById('budgetTable').innerHTML=budgetTable(l);bind()};if(q)q.oninput=f;if(s)s.onchange=f}const tq=document.getElementById('templateSearch'),tc=document.getElementById('templateCategory');if(tq||tc){const f=()=>{let v=(tq?.value||'').toLowerCase(),cat=tc?.value||'all';let l=TEMPLATES.filter(t=>(cat==='all'||t.category===cat)&&[t.nome,t.category,t.objeto].join(' ').toLowerCase().includes(v));document.getElementById('templateGrid').innerHTML=templateCards(l);bind()};if(tq)tq.oninput=f;if(tc)tc.onchange=f}const et=document.getElementById('editorTemplate');if(et)et.onchange=()=>{const id=selectedId?.budgetId||null;setPage('editor',{budgetId:id,templateId:et.value})}}
function action(a,id){if(a==='new-budget')setPage('editor',{budgetId:null,templateId:'instituicao_condominio'});if(a==='view-budget')setPage('preview',id);if(a==='edit-budget')setPage('editor',{budgetId:id,templateId:null});if(a==='view-template')setPage('template-detail',id);if(a==='use-template')setPage('editor',{budgetId:null,templateId:id});if(a==='print-budget')window.print();if(a==='clear-dashboard'){dashStatus='all';setPage('dashboard')}if(a==='duplicate-budget'){const b=data.budgets.find(x=>x.id===id);if(b){let n=Math.max(...data.budgets.map(x=>Number(x.number.split('-').pop())||0))+1;data.budgets.push({...clone(b),id:'b'+Date.now(),number:'ORC-'+new Date().getFullYear()+'-'+String(n).padStart(3,'0'),date:TODAY(),validUntil:addDays(TODAY(),15),status:'draft'});save();toast('Orçamento duplicado.');setPage('budgets')}}if(a==='save-budget')saveBudget(id||null);if(a==='save-settings'){data.company.name=document.getElementById('companyName').value||data.company.name;data.responsible=document.getElementById('responsible').value||data.responsible;data.company.phone=document.getElementById('phone').value||data.company.phone;save();toast('Configurações salvas.');setPage('settings')}if(a==='restore'){data=clone(seed);save();toast('Demonstração restaurada.');setPage('dashboard')}}
function saveBudget(id){const f=document.getElementById('budgetForm');if(!f)return;const fd=new FormData(f),old=id?data.budgets.find(x=>x.id===id):null,t=template(fd.get('templateId'));let n=old?.number;if(!n){let max=Math.max(...data.budgets.map(x=>Number(x.number.split('-').pop())||0));n='ORC-'+new Date().getFullYear()+'-'+String(max+1).padStart(3,'0')}const b={id:old?.id||'b'+Date.now(),number:n,date:fd.get('date'),validUntil:fd.get('validUntil'),clientId:fd.get('clientId'),templateId:fd.get('templateId'),title:fd.get('title'),responsible:fd.get('responsible'),status:fd.get('status'),property:{matricula:fd.get('matricula'),loteIdentificacao:fd.get('loteIdentificacao'),landArea:Number(fd.get('landArea')||0),buildingArea:Number(fd.get('buildingArea')||0),address:fd.get('propertyAddress'),local:'Dourados/MS'},honorarios:[{description:fd.get('feeDescription'),calculationBase:fd.get('calculationBase'),value:Number(fd.get('feeValue')||0)}],custosTerceiros:old?.custosTerceiros||[],discountPercent:Number(fd.get('discountPercent')||0),objeto:fd.get('objeto')||t.objeto,escopoServicos:fd.get('escopoServicos')||t.escopoServicos,metodologiaEntregaveis:fd.get('metodologiaEntregaveis')||t.metodologiaEntregaveis,prazoExecucao:fd.get('prazoExecucao')||t.prazoExecucao,formaPagamento:fd.get('formaPagamento')||t.formaPagamento,naoIncluidos:fd.get('naoIncluidos')||t.naoIncluidos,observacoes:fd.get('observacoes')||t.observacoes,validityDays:t.validityDays};if(old)Object.assign(old,b);else data.budgets.push(b);save();toast('Orçamento salvo.');setPage('preview',b.id)}
const sidebar=document.getElementById('sidebar'),overlay=document.getElementById('overlay');document.querySelectorAll('.nav-item').forEach(x=>x.onclick=()=>setPage(x.dataset.page));document.getElementById('collapse').onclick=()=>sidebar.classList.toggle('collapsed');document.getElementById('mobileMenu').onclick=()=>{sidebar.classList.add('mobile-open');overlay.classList.remove('hidden')};overlay.onclick=closeMobile;function closeMobile(){sidebar.classList.remove('mobile-open');overlay.classList.add('hidden')}document.getElementById('companySelect').onchange=e=>{data.company.name=e.target.value;save();render()};
render();
})();
</script>
</body></html>
